name: Publish Package

on:
  push:
    branches: ['main']
    tags:
      - 'rscute@*'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/rscute@')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Check if version already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "rscute@${PKG_VERSION}" version 2>/dev/null; then
            echo "Version ${PKG_VERSION} is already published. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Publish
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish
